# ─────────────────────────────────────────────────────────────────
# Ghosted Platform — Production Deployment
# ─────────────────────────────────────────────────────────────────
# Usage:
#   docker compose -f docker-compose.prod.yml build   # Build the images
#   docker compose -f docker-compose.prod.yml up -d   # Run the app
# ─────────────────────────────────────────────────────────────────

name: ghosted-prod

services:
  # ─── Frontend (Web) ──────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: ghosted-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    depends_on:
      - api
    networks:
      - ghosted-network

  # ─── Backend (API) ───────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ghosted-api
    restart: always
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - API_PORT=4000
      - API_CORS_ORIGIN=${API_CORS_ORIGIN:-http://localhost:3000}
      - DATABASE_URL=${DATABASE_URL:-postgresql://ghosted:ghosted_secret@postgres:5432/ghosted?schema=public}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-change-me-to-a-random-32-char-string}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:4000}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-ghosted_minio}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-ghosted_minio_secret}
      - S3_BUCKET=${S3_BUCKET:-ghosted-files}
      - S3_REGION=${S3_REGION:-us-east-1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - ghosted-network

  # ─── PostgreSQL 17 ──────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: ghosted-postgres
    restart: always
    environment:
      POSTGRES_USER: ghosted
      POSTGRES_PASSWORD: ghosted_secret
      POSTGRES_DB: ghosted
    volumes:
      - ghosted-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ghosted -d ghosted"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ghosted-network

  # ─── Redis 7 ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ghosted-redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - ghosted-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ghosted-network

  # ─── MinIO (S3-compatible Object Storage) ───────────────────────
  minio:
    image: minio/minio:latest
    container_name: ghosted-minio
    restart: always
    environment:
      MINIO_ROOT_USER: ghosted_minio
      MINIO_ROOT_PASSWORD: ghosted_minio_secret
    command: server /data --console-address ":9001"
    volumes:
      - ghosted-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - ghosted-network

  # ─── MinIO Bucket Initialization ────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: ghosted-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set ghosted http://minio:9000 ghosted_minio ghosted_minio_secret;
      mc mb --ignore-existing ghosted/ghosted-files;
      mc anonymous set download ghosted/ghosted-files/public;
      echo 'MinIO bucket initialized successfully';
      "
    networks:
      - ghosted-network

volumes:
  ghosted-postgres-data:
    driver: local
  ghosted-redis-data:
    driver: local
  ghosted-minio-data:
    driver: local

networks:
  ghosted-network:
    driver: bridge
